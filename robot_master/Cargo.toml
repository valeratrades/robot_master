[package]
name = "robot_master"
edition = "2024"
version = "0.1.0"

[lib]
name = "robot_master"
crate-type = ["cdylib", "rlib"]

[features]
default = []
python = ["dep:pyo3", "robot_master_core/python"]

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
clap = { version = "4.5", features = ["derive"] }

[dependencies]
robot_master_arena = { path = "../robot_master_arena" }
robot_master_core = { path = "../robot_master_core" }

pyo3 = { version = "0.23", features = ["extension-module"], optional = true }
rand = "0.9"

serde.workspace = true
serde_json.workspace = true
ustr.workspace = true
v_utils.workspace = true

[dev-dependencies]
insta = "1"

[lints]
workspace = true
