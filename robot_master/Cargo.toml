[package]
name = "robot_master"
edition = "2024"
version = "0.1.0"

[lib]
name = "robot_master"
crate-type = ["cdylib", "rlib"]

[features]
default = []
python = ["dep:pyo3", "robot_master_core/python"]

[dependencies]
robot_master_core = { path = "../robot_master_core" }

pyo3 = { version = "0.23", features = ["extension-module"], optional = true }
rand = "0.9"

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
clap = { version = "4.5", features = ["derive"] }

[lints]
workspace = true
