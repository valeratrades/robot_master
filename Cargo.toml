cargo-features = ["codegen-backend"]

[workspace]
members = ["robot_master", "robot_master_*"]
resolver = "3"

default-members = ["robot_master"]

[workspace.lints.clippy]
doc_lazy_continuation = "allow"
float_cmp = "allow"
get_first = "allow"
get_last_with_len = "allow"
len_zero = "allow"
tabs_in_doc_comments = "allow"
undocumented_unsafe_blocks = "warn"

[workspace.dependencies]
bevy = "0.18"
v_utils = { version = "2.15", features = ["macros"] }

[profile.wasm-release]
inherits = "release"
opt-level = 'z'
lto = true
codegen-units = 1
panic = "abort"
