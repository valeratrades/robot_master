cargo-features = ["codegen-backend"]

[package]
name = "robot_master_game"
edition = "2024"
version = "0.1.0"

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
v_utils = { workspace = true, features = ["io", "bevy"] }

[dependencies]
robot_master_arena = { path = "../robot_master_arena" }
robot_master_core = { path = "../robot_master_core" }
robot_master_train = { path = "../robot_master_train" }

bevy.workspace = true
bevy_simple_text_input = "0.14"
fuzzy-matcher = "0.3"
rand.workspace = true
strum.workspace = true
ustr.workspace = true

[lints]
workspace = true
