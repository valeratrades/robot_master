[package]
name = "robot_master_core"
edition = "2024"
version = "0.1.0"

[lib]
name = "robot_master_core"
crate-type = ["cdylib", "rlib"]

[features]
default = []
python = ["dep:pyo3"]

[dependencies]
pyo3 = { version = "0.23", features = ["extension-module"], optional = true }
thiserror = "2"

rand.workspace = true

[lints]
workspace = true
